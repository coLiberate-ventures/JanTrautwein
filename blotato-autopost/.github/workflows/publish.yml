name: Publish to social via Blotato

# Runs when you add/edit posts in content/queue.json (push to main),
# on a manual trigger, and hourly as a safety net so scheduled posts
# in the queue always get submitted to Blotato.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "content/queue.json"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: blotato-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Submit queued posts to Blotato
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
        run: node scripts/publish.mjs

      - name: Commit published archive + updated queue
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/
            git commit -m "chore: archive published posts [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
