<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vision Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#DAE7DE;
  --text:#1A2B28;
  --muted:#5A7872;
  --gold:#FAB700;
  --glow: 250,183,0;
  --panel: rgba(20,30,28,0.78);
  --serif:'Lora',Georgia,serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0c1411;font-family:var(--sans);color:var(--text)}

/* ---- Stage: image covers viewport, orbs anchored to image coords ---- */
.canvas, .bg-layer{
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:max(100vw, calc(100vh * 1536 / 1024));
  height:max(100vh, calc(100vw * 1024 / 1536));
}
.bg-layer{z-index:1}
.canvas{z-index:5}
body.flying .canvas{z-index:70}   /* orbs render OVER the playing video and fade out on top */
.bg-layer .bg{width:100%;height:100%;display:block;object-fit:fill;user-select:none;-webkit-user-drag:none}
.vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 90% at 50% 40%, transparent 55%, rgba(8,14,11,0.35) 100%)}

/* ---- Orbs ---- */
.orb{
  position:absolute; transform:translate(-50%,-50%);
  width:26px;height:26px;cursor:pointer;z-index:5;
  border:0;background:transparent;padding:0;
  animation:float 6s ease-in-out infinite;
}
.orb .core{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 50% 45%, #fff 0%, rgba(var(--glow),0.95) 35%, rgba(var(--glow),0.25) 70%, transparent 72%);
  box-shadow:0 0 14px 4px rgba(var(--glow),0.55), 0 0 34px 10px rgba(var(--glow),0.30);
}
.orb .pulse{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(var(--glow),0.7);
  animation:pulse 2.8s ease-out infinite;
}
.orb .pulse.b{animation-delay:1.4s}
.orb:hover .core{transform:scale(1.18)}
.orb.done .core{
  background:radial-gradient(circle at 50% 45%, #fff 0%, #bfe6cf 38%, rgba(120,200,160,0.3) 70%, transparent 72%);
  box-shadow:0 0 16px 5px rgba(120,210,160,0.6), 0 0 38px 12px rgba(120,210,160,0.30);
}
.orb.done .pulse{border-color:rgba(120,210,160,0.7)}

@keyframes pulse{
  0%{transform:scale(1);opacity:.8}
  100%{transform:scale(3.4);opacity:0}
}
@keyframes float{
  0%,100%{margin-top:0}
  50%{margin-top:-7px}
}

/* ---- Hover label ---- */
.orb .label{
  position:absolute;left:50%;bottom:calc(100% + 14px);transform:translateX(-50%) translateY(6px);
  background:var(--panel);color:#f4f7f2;backdrop-filter:blur(8px);
  padding:7px 15px;border-radius:999px;white-space:nowrap;
  font-family:var(--serif);font-size:15px;letter-spacing:.3px;
  border:1px solid rgba(var(--glow),0.35);
  opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;
  box-shadow:0 6px 22px rgba(0,0,0,.3);
}
.orb .label::after{
  content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--panel);
}
.orb .label .sub{display:block;font-family:var(--sans);font-size:11px;
  color:rgba(var(--glow),0.95);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
.orb:hover .label{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Intro hint ---- */
.hint{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%);
  z-index:20;color:#eef3ec;font-size:13.5px;letter-spacing:.4px;
  background:var(--panel);backdrop-filter:blur(8px);
  padding:11px 22px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
  box-shadow:0 8px 30px rgba(0,0,0,.35);
  transition:opacity .6s ease;display:flex;align-items:center;gap:10px;
}
.hint b{font-weight:500;color:var(--gold)}
.hint.hide{opacity:0;pointer-events:none}

/* ---- Top brand ---- */
.brand{
  position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:20;
  text-align:center;color:#fff;mix-blend-mode:normal;
  text-shadow:0 2px 18px rgba(0,0,0,.5);
}
.brand h1{font-family:var(--serif);font-weight:500;font-size:22px;letter-spacing:1px}
.brand p{font-size:11.5px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.8);margin-top:3px}

/* ---- Progress dots (top right) ---- */
.progress{position:fixed;top:30px;right:28px;z-index:20;display:flex;gap:9px;align-items:center}
.progress .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.35);
  border:1px solid rgba(255,255,255,.5);transition:all .3s}
.progress .dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(var(--glow),.8)}
.progress button{background:rgba(20,30,28,.7);backdrop-filter:blur(6px);color:#fff;border:1px solid rgba(255,255,255,.18);
  font-family:var(--sans);font-size:12px;padding:7px 14px;border-radius:999px;cursor:pointer;margin-left:6px;letter-spacing:.3px}
.progress button:hover{border-color:var(--gold);color:var(--gold)}
.progress button#soundBtn.on{border-color:var(--gold);color:var(--gold);background:rgba(250,183,0,.15)}

/* ---- Modal ---- */
.backdrop{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(8,14,11,0.55);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .35s ease;padding:24px;
}
.backdrop.open{opacity:1;pointer-events:auto}
.modal{
  width:min(560px,100%);max-height:88vh;overflow-y:auto;
  background:var(--bg);border-radius:20px;
  border:1px solid rgba(20,30,28,.1);
  box-shadow:0 30px 90px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.4) inset;
  transform:translateY(24px) scale(.94);opacity:0;
  transition:transform .42s cubic-bezier(.2,.9,.25,1.1), opacity .42s ease;
  position:relative;
}
.backdrop.open .modal{transform:translateY(0) scale(1);opacity:1}
.modal .accent{height:5px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,var(--gold),#ffd766)}
.modal .body{padding:30px 34px 30px}
.modal .eyebrow{display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted);font-weight:600}
.modal .eyebrow .num{width:22px;height:22px;border-radius:50%;background:var(--gold);color:#1A2B28;
  display:grid;place-items:center;font-size:11px;font-weight:600;letter-spacing:0}
.modal h2{font-family:var(--serif);font-weight:500;font-size:30px;margin:14px 0 6px;line-height:1.15;color:var(--text)}
.modal .lead{font-size:15px;line-height:1.55;color:var(--muted);margin-bottom:18px}
.modal .qs{list-style:none;margin:0 0 18px;padding:16px 18px;background:rgba(90,120,114,.10);
  border-radius:12px;border-left:3px solid var(--gold)}
.modal .qs li{font-size:13.5px;line-height:1.5;color:var(--text);padding:4px 0 4px 18px;position:relative}
.modal .qs li::before{content:"";position:absolute;left:2px;top:11px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.modal textarea{
  width:100%;min-height:140px;resize:vertical;border-radius:12px;
  border:1px solid rgba(20,30,28,.18);background:#fff;
  padding:14px 15px;font-family:var(--sans);font-size:15px;line-height:1.55;color:var(--text);
  outline:none;transition:border-color .2s, box-shadow .2s;
}
.modal textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(var(--glow),.18)}
.modal textarea::placeholder{color:#9aaaa3}
.modal .row{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:12px}
.modal .saved-msg{font-size:13px;color:var(--muted);opacity:0;transition:opacity .3s}
.modal .saved-msg.show{opacity:1}
.btn{font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:.3px;cursor:pointer;
  border:none;padding:12px 26px;border-radius:999px;transition:all .2s}
.btn.primary{background:var(--text);color:#fff}
.btn.primary:hover{background:#0f1c19;transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--text)}
.modal .close{position:absolute;top:16px;right:18px;width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(20,30,28,.15);background:rgba(255,255,255,.5);color:var(--text);cursor:pointer;
  font-size:18px;line-height:1;display:grid;place-items:center;transition:all .2s}
.modal .close:hover{background:#fff;transform:rotate(90deg)}

/* nav between orbs inside modal */
.modal .nav{display:flex;gap:8px;align-items:center}
.modal .nav span{font-size:12px;color:var(--muted)}

/* ---- Summary view ---- */
.summary .body{padding:30px 34px}
.summary h2{font-family:var(--serif);font-size:28px;font-weight:500;margin-bottom:4px}
.summary .sub{font-size:13.5px;color:var(--muted);margin-bottom:22px}
.summary .block{margin-bottom:18px;padding:16px 18px;background:#fff;border-radius:12px;border:1px solid rgba(20,30,28,.08)}
.summary .block h3{font-family:var(--serif);font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.summary .block h3 .tag{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;background:var(--gold);
  color:#1A2B28;padding:2px 7px;border-radius:5px;font-family:var(--sans);font-weight:600}
.summary .block p{font-size:14px;line-height:1.55;color:var(--text);white-space:pre-wrap}
.summary .block p.empty{color:#9aaaa3;font-style:italic}


/* ---- Cinematic scene system ---- */
#sceneStage{position:fixed;inset:0;z-index:60;background:transparent;opacity:0;visibility:hidden;
  transition:opacity .12s ease, visibility .12s;pointer-events:none}
#sceneStage.show{opacity:1;visibility:visible;pointer-events:auto}
#sceneStage .scenevid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
#sceneStage .scenevid.active{display:block}
.flyback{position:absolute;top:24px;left:24px;z-index:5;display:flex;align-items:center;gap:8px;
  background:rgba(12,20,16,.55);backdrop-filter:blur(10px);color:#fff;border:1px solid rgba(255,255,255,.22);
  font-family:var(--sans);font-size:14px;padding:10px 18px;border-radius:999px;cursor:pointer;
  opacity:0;pointer-events:none;transition:opacity .5s ease, border-color .2s, transform .2s}
.flyback.show{opacity:1;pointer-events:auto}
.flyback:hover{border-color:var(--gold);color:var(--gold);transform:translateX(-2px)}
.btn.gold{background:var(--gold);color:#1A2B28}
.btn.gold:hover{background:#ffc835;transform:translateY(-1px)}
.orb, .brand, .hint, .progress, .credit{transition:opacity .9s ease}
.flying .orb, .flying .brand, .flying .hint, .flying .progress, .flying .credit{
  opacity:0 !important;pointer-events:none !important}
/* vision card (floats from bottom) */
#visionOverlay{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 1s ease;
  background:linear-gradient(to top, rgba(8,14,11,.72) 0%, rgba(8,14,11,.28) 38%, transparent 70%)}
#visionOverlay.show{opacity:1;pointer-events:auto}
.flycard{width:min(620px,92%);margin-bottom:8vh;text-align:center;color:#fff;
  transform:translateY(20px);transition:transform 1s cubic-bezier(.2,.9,.25,1.1)}
#visionOverlay.show .flycard{transform:translateY(0)}
.flycard .eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);
  font-weight:600;margin-bottom:10px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.flycard h2{font-family:var(--serif);font-weight:500;font-size:38px;line-height:1.1;margin-bottom:18px;text-shadow:0 3px 24px rgba(0,0,0,.6)}
.flycard textarea{width:100%;min-height:120px;resize:vertical;border-radius:14px;border:1px solid rgba(255,255,255,.25);
  background:rgba(12,20,16,.55);backdrop-filter:blur(10px);padding:15px 16px;font-family:var(--sans);font-size:16px;line-height:1.55;color:#fff;outline:none;transition:border-color .2s, box-shadow .2s}
.flycard textarea::placeholder{color:rgba(255,255,255,.5)}
.flycard textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(var(--glow),.25)}
.flycard .frow{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:16px}
.flycard .fsaved{font-size:13px;color:rgba(255,255,255,.7);opacity:0;transition:opacity .3s}
.flycard .fsaved.show{opacity:1}

/* ---- Skill tree panel (floats from right) ---- */
#skillOverlay{position:absolute;top:0;right:0;bottom:0;width:min(700px,66vw);
  display:flex;align-items:center;justify-content:center;padding:26px 26px 26px 0;
  transform:translateX(108%);transition:transform 1s cubic-bezier(.2,.9,.25,1.05);pointer-events:none}
#skillOverlay.show{transform:translateX(0);pointer-events:auto}
.skillpanel{position:relative;width:100%;max-height:90vh;overflow:auto;
  background:linear-gradient(180deg, rgba(14,20,17,.62), rgba(9,13,11,.68));backdrop-filter:blur(16px);
  border:1px solid rgba(var(--glow),.34);border-radius:18px;
  box-shadow:0 30px 90px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.05), inset 0 0 60px rgba(0,0,0,.4);
  padding:26px 26px 30px}
.skillpanel::-webkit-scrollbar{width:8px}
.skillpanel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:8px}
.skill-title{font-family:var(--serif);font-weight:500;font-size:30px;letter-spacing:4px;text-transform:uppercase;
  text-align:center;color:#f3ead2;text-shadow:0 2px 16px rgba(0,0,0,.6)}
.skill-sub{display:flex;align-items:center;justify-content:center;gap:12px;margin:8px 0 22px;
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(var(--glow),.95);font-weight:600}
.skill-sub .dash{height:1px;width:34px;background:linear-gradient(90deg,transparent,rgba(var(--glow),.6))}
.skill-sub .dash.r{background:linear-gradient(90deg,rgba(var(--glow),.6),transparent)}
.skill-sub b{color:#fff;font-size:13px}
.skill-cols{display:flex;gap:14px;justify-content:center}
.skill-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0}
.skill-col h4{font-family:var(--sans);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#cdd8d0;margin-bottom:14px;font-weight:600;text-align:center;min-height:28px}
.node{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:default}
.node .ring{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;position:relative;
  background:radial-gradient(circle at 50% 38%, rgba(60,70,64,.9), rgba(24,30,27,.95));
  border:2px solid rgba(255,255,255,.16);transition:all .25s ease;color:#9fb0a6}
.node .ring svg{width:24px;height:24px}
.node .lvl{font-family:var(--sans);font-size:11px;font-weight:600;color:#8a9890;letter-spacing:.5px}
.node .nm{font-size:10.5px;color:#9aa8a0;text-align:center;line-height:1.15;max-width:78px;letter-spacing:.2px}
.node.filled .ring{background:radial-gradient(circle at 50% 35%, #ffe9a8, var(--gold) 70%);border-color:#ffdd77;color:#3a2c00;
  box-shadow:0 0 16px 2px rgba(var(--glow),.55)}
.node.filled .lvl{color:var(--gold)}
.node.filled .nm{color:#e7eee8}
.node.active .ring{border-color:rgba(var(--glow),.9);color:#ffe6a0;cursor:pointer;
  box-shadow:0 0 0 0 rgba(var(--glow),.5);animation:nodepulse 2s ease-out infinite}
.node.active:hover .ring{transform:scale(1.08);background:radial-gradient(circle at 50% 38%, rgba(90,80,40,.95), rgba(40,40,28,.95))}
.node.active .nm{color:#dfe7e0}
.node.partial .ring{border-color:rgba(var(--glow),.9);color:#ffe6a0;cursor:pointer}
.node.locked{opacity:.5}
@keyframes nodepulse{0%{box-shadow:0 0 0 0 rgba(var(--glow),.45)}100%{box-shadow:0 0 0 12px rgba(var(--glow),0)}}
.connector{width:2px;height:16px;margin:3px 0;background:linear-gradient(to top, rgba(255,255,255,.12), rgba(var(--glow),.4));position:relative}
.connector.on{background:linear-gradient(to top, rgba(var(--glow),.5), rgba(var(--glow),.85))}
.connector::after{content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:5px solid rgba(var(--glow),.55)}
.skill-foot{display:flex;justify-content:center;align-items:center;gap:16px;margin-top:22px}
.skill-foot .reset{background:transparent;border:1px solid rgba(255,255,255,.25);color:#cdd8d0;
  font-family:var(--sans);font-size:12px;letter-spacing:.4px;padding:9px 18px;border-radius:999px;cursor:pointer;transition:all .2s}
.skill-foot .reset:hover{border-color:var(--gold);color:var(--gold)}
.skill-hint{font-size:11px;color:rgba(255,255,255,.45)}
@media (max-aspect-ratio: 1/1){
  #skillOverlay{width:100%;padding:14px}
  .skill-title{font-size:24px;letter-spacing:2px}
  .skill-cols{gap:6px}
  .node .ring{width:46px;height:46px}
  .node .nm{font-size:9.5px;max-width:64px}
  .flycard h2{font-size:28px}.flycard{margin-bottom:6vh}
}

/* ---- Mobile / portrait: contain the whole scene so no orb is cropped ---- */
@media (max-aspect-ratio: 1/1){
  body{
    background:radial-gradient(120% 80% at 50% 30%, #15211c 0%, #0a120f 70%, #070d0b 100%);
  }
  .canvas, .bg-layer{
    width:100vw;
    height:calc(100vw * 1024 / 1536);
  }
  .bg-layer{box-shadow:0 24px 70px rgba(0,0,0,.55)}
  .bg-layer .bg{border-radius:2px}
  .orb{width:34px;height:34px}            /* bigger tap target */
  .orb .label{opacity:0 !important}        /* no hover labels on touch */
  .brand{top:max(18px, env(safe-area-inset-top))}
  .hint{bottom:max(22px, env(safe-area-inset-bottom))}
  .progress{top:max(20px, env(safe-area-inset-top));right:16px}
  .progress .dot{width:8px;height:8px}
}
.credit{position:fixed;bottom:8px;right:12px;z-index:18;font-size:10px;color:rgba(255,255,255,.45);
  letter-spacing:.3px;text-shadow:0 1px 4px rgba(0,0,0,.6);font-family:var(--sans)}
.credit a{color:inherit;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,.25)}
.credit a:hover{color:var(--gold)}
@media (max-aspect-ratio: 1/1){.credit{bottom:6px;right:10px;font-size:9px}}
@media (max-width:520px){
  .modal .body{padding:24px 22px}
  .modal h2{font-size:25px}
  .brand h1{font-size:18px}
  .hint{font-size:12px;padding:10px 16px;width:calc(100% - 36px);justify-content:center;text-align:center}
}
</style>

<body>

<div class="bg-layer">
  <img class="bg" src="images/life-adventure.png" alt="A traveller on a path looking toward a distant mountain">
  <div class="vignette"></div>
</div>
<div class="canvas">

  <!-- Orbs: positions are % of the image -->
  <button class="orb" data-key="self"     style="left:27.5%;top:54%"></button>
  <button class="orb" data-key="obstacle" style="left:52%;top:48%"></button>
  <button class="orb" data-key="plan"     style="left:55%;top:80%"></button>
  <button class="orb" data-key="vision"   style="left:61%;top:13%"></button>
</div>

<div class="brand">
  <h1>Your Vision Map</h1>
  <p>Self · Plan · Obstacle · Vision</p>
</div>

<div class="progress">
  <span class="dot" data-d="self"></span>
  <span class="dot" data-d="plan"></span>
  <span class="dot" data-d="obstacle"></span>
  <span class="dot" data-d="vision"></span>
  <button id="soundBtn" title="Sound on/off" aria-label="Toggle sound">♪ Sound</button>
  <button id="summaryBtn">Summary</button>
</div>

<div class="hint" id="hint">
  <span>✦</span><span>Hover the glowing points of light, then click one to begin. Start with <b>Self</b>.</span>
</div>

<!-- Modal -->
<div class="backdrop" id="backdrop">
  <div class="modal" id="modal">
    <div class="accent"></div>
    <button class="close" id="closeBtn" aria-label="Close">×</button>
    <div class="body" id="modalBody"><!-- filled by JS --></div>
  </div>
</div>

  <!-- Cinematic scene stage -->
  <div id="sceneStage">
    <video id="vFwd" class="scenevid" muted playsinline preload="auto"><source src="video/fly-forward.mp4" type="video/mp4"></video>
    <video id="vRev" class="scenevid" muted playsinline preload="auto"><source src="video/fly-reverse.mp4" type="video/mp4"></video>
    <video id="sFwd" class="scenevid" muted playsinline preload="auto"><source src="video/skill-forward.mp4" type="video/mp4"></video>
    <video id="sRev" class="scenevid" muted playsinline preload="auto"><source src="video/skill-reverse.mp4" type="video/mp4"></video>
    <button id="sceneBack" class="flyback" aria-label="Go back">&#8592; Back</button>
    <div id="visionOverlay">
      <div class="flycard">
        <div class="eyebrow">Vision &mdash; the summit</div>
        <h2>What is the vision?</h2>
        <textarea id="flyAnswer" placeholder="The vision is&hellip;"></textarea>
        <div class="frow"><span class="fsaved" id="flySaved">Saved &#10003;</span><button class="btn gold" id="flySave">Save</button></div>
      </div>
    </div>
    <div id="skillOverlay"><div class="skillpanel" id="skillPanel"></div></div>
  </div>

<script>
const CONTENT = {
  self: {
    n:1, label:"Self", sub:"The one who stands here",
    h:"Who are you, right now?",
    lead:"Before the path, before the summit, there is you, the one standing at the trailhead. Name where you truly are today, honestly and without polish.",
    qs:[
      "What are your real strengths and the gifts you bring?",
      "What is your current situation, your starting point in plain terms?",
      "What do you most deeply care about right now?"
    ],
    ph:"I am…"
  },
  vision: {
    n:4, label:"Vision", sub:"The summit on the horizon",
    h:"What is the vision?",
    lead:"The mountain is the future you are drawn toward. Describe it as if it were already real, vivid enough that you would recognise it the moment you arrived.",
    qs:[
      "If everything went right, what does success look and feel like?",
      "Why does this matter? Who does it serve?",
      "How will you know you have reached the summit?"
    ],
    ph:"The vision is…"
  },
  obstacle: {
    n:3, label:"Obstacle", sub:"What lies across the path",
    h:"What stands in the way?",
    lead:"Halfway up the trail lie the ruins, the obstacles between here and there. Naming them clearly is the first step to moving through them.",
    qs:[
      "What is the single biggest thing blocking the way?",
      "Which obstacles are outer (resources, skills) and which are inner (fear, doubt)?",
      "What has stopped you before, and might again?"
    ],
    ph:"What stands in the way is…"
  },
  plan: {
    n:2, label:"Plan", sub:"The path beneath your feet",
    h:"What is the plan?",
    lead:"The trail is the route from where you stand to the summit. You do not need every step, just the next few that are real and within reach.",
    qs:[
      "What are the first 3 concrete steps from here?",
      "What is the very next action you could take this week?",
      "Who or what could help you along the way?"
    ],
    ph:"The plan is…"
  }
};
const ORDER = ["self","plan","obstacle","vision"];
const STORE = "visionMap.v1";
let data = JSON.parse(localStorage.getItem(STORE) || "{}");
let current = null;

const $ = s => document.querySelector(s);
const backdrop = $("#backdrop"), modalBody = $("#modalBody");

function refreshOrbState(){
  document.querySelectorAll(".orb").forEach(o=>{
    const k=o.dataset.key;
    o.classList.toggle("done", !!(data[k] && data[k].trim()));
    o.innerHTML = `<span class="core"></span><span class="pulse"></span><span class="pulse b"></span>
      <span class="label"><span class="sub">${CONTENT[k].label}</span>${CONTENT[k].h}</span>`;
  });
  document.querySelectorAll(".progress .dot").forEach(d=>{
    const k=d.dataset.d;
    d.classList.toggle("on", !!(data[k] && data[k].trim()));
  });
}

function openModal(key){
  current = key;
  const c = CONTENT[key];
  modalBody.innerHTML = `
    <div class="eyebrow"><span class="num">${c.n}</span> ${c.label} &mdash; ${c.sub}</div>
    <h2>${c.h}</h2>
    <p class="lead">${c.lead}</p>
    <ul class="qs">${c.qs.map(q=>`<li>${q}</li>`).join("")}</ul>
    <textarea id="answer" placeholder="${c.ph}">${data[key] ? escapeHtml(data[key]) : ""}</textarea>
    <div class="row">
      <div class="nav">
        <button class="btn ghost" id="prevBtn">‹ Prev</button>
        <button class="btn ghost" id="nextBtn">Next ›</button>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <span class="saved-msg" id="savedMsg">Saved ✓</span>
        <button class="btn primary" id="saveBtn">Save</button>
      </div>
    </div>`;
  backdrop.classList.add("open");
  const ta = $("#answer"); setTimeout(()=>ta.focus(),420);
  ta.addEventListener("input", autosave);
  $("#saveBtn").addEventListener("click", ()=>{ save(); flashSaved(); });
  $("#prevBtn").addEventListener("click", ()=>step(-1));
  $("#nextBtn").addEventListener("click", ()=>step(1));
}
let saveTimer;
function autosave(){ clearTimeout(saveTimer); saveTimer=setTimeout(save,500); }
function save(){
  const ta=$("#answer"); if(!ta) return;
  data[current]=ta.value;
  localStorage.setItem(STORE, JSON.stringify(data));
  

refreshOrbState();
}
function flashSaved(){ const m=$("#savedMsg"); if(!m)return; m.classList.add("show"); setTimeout(()=>m.classList.remove("show"),1600); }
function step(dir){
  save();
  const i = ORDER.indexOf(current);
  const next = ORDER[(i+dir+ORDER.length)%ORDER.length];
  openModal(next);
}
function closeModal(){ save(); backdrop.classList.remove("open"); current=null; }

/* Summary */
function openSummary(){
  current="__summary__";
  modalBody.parentElement.classList.add("summary");
  modalBody.innerHTML = `
    <div class="eyebrow"><span class="num">✦</span> The whole picture</div>
    <h2 style="margin-bottom:4px">Your Vision Map</h2>
    <p class="sub">Everything you have named so far, in one view.</p>
    ${ORDER.map(k=>{
      const v=(data[k]||"").trim();
      return `<div class="block">
        <h3><span class="tag">${CONTENT[k].label}</span> ${CONTENT[k].h}</h3>
        <p class="${v?"":"empty"}">${v?escapeHtml(v):"Not yet written. Click the "+CONTENT[k].label+" orb to add it."}</p>
      </div>`;
    }).join("")}
    <div class="row" style="justify-content:flex-end">
      <button class="btn ghost" id="copyBtn">Copy as text</button>
      <button class="btn primary" id="doneBtn">Close</button>
    </div>`;
  backdrop.classList.add("open");
  $("#doneBtn").addEventListener("click", closeSummary);
  $("#copyBtn").addEventListener("click", copyAll);
}
function closeSummary(){ backdrop.classList.remove("open"); modalBody.parentElement.classList.remove("summary"); current=null; }
function copyAll(){
  const txt = ORDER.map(k=>`## ${CONTENT[k].label} — ${CONTENT[k].h}\n${(data[k]||"(blank)").trim()}`).join("\n\n");
  navigator.clipboard.writeText(txt).then(()=>{ const b=$("#copyBtn"); b.textContent="Copied ✓"; setTimeout(()=>b.textContent="Copy as text",1600); });
}

function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* Wire up */
document.querySelectorAll(".orb").forEach(o=>{
  o.addEventListener("click",()=>{ $("#hint").classList.add("hide"); if(o.dataset.key==="vision"){ startScene("vision"); } else if(o.dataset.key==="self"){ startScene("self"); } else { openModal(o.dataset.key); } });
});
$("#closeBtn").addEventListener("click", ()=> current==="__summary__"?closeSummary():closeModal());
$("#summaryBtn").addEventListener("click", openSummary);
backdrop.addEventListener("click",e=>{ if(e.target===backdrop){ current==="__summary__"?closeSummary():closeModal(); }});
document.addEventListener("keydown",e=>{ if(e.key==="Escape" && backdrop.classList.contains("open")){ current==="__summary__"?closeSummary():closeModal(); }});

// touch devices: reword the hint (no hover)
if (window.matchMedia('(pointer: coarse)').matches){
  document.querySelector('#hint').lastElementChild.innerHTML =
    'Tap the glowing points of light to begin. Start with <b>Self</b>.';
}
// auto-hide hint after a while
setTimeout(()=>$("#hint").classList.add("hide"), 9000);
refreshOrbState();

/* ====== Cinematic scene controller ====== */
const sceneStage=document.getElementById('sceneStage');
const sceneBack=document.getElementById('sceneBack');
const visionOverlay=document.getElementById('visionOverlay');
const skillOverlay=document.getElementById('skillOverlay');
const flyAnswer=document.getElementById('flyAnswer');
const SCENES={
  vision:{fwd:'vFwd',rev:'vRev',overlay:'visionOverlay',overlayTiming:'end'},
  self:  {fwd:'sFwd',rev:'sRev',overlay:'skillOverlay',overlayTiming:'start'}
};
let sceneActive=false,curScene=null;
function showVid(id){document.querySelectorAll('#sceneStage .scenevid').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
function playScene(v,reveal){var fired=false;var onready=function(){if(fired)return;fired=true;reveal&&reveal();v.play().catch(function(){});};v.addEventListener('loadeddata',onready,{once:true});v.addEventListener('canplay',onready,{once:true});try{v.pause();v.load();}catch(e){onready();}setTimeout(onready,1200);}
function startScene(key){
  if(sceneActive||!SCENES[key])return;sceneActive=true;curScene=key;
  const sc=SCENES[key];
  if(key==='vision')flyAnswer.value=data.vision?data.vision:'';
  if(key==='self')renderSkill();                 // pre-render so the panel is ready to slide in
  document.body.classList.add('flying');
  visionOverlay.classList.remove('show');skillOverlay.classList.remove('show');sceneBack.classList.remove('show');
  const f=document.getElementById(sc.fwd);
  sceneStage.classList.add('show');
  // Arrival reveal (vision): runs exactly once, whether the video ends cleanly,
  // stalls, or never loads. Without this the full-screen stage would trap every click.
  let arrived=false;
  function revealArrival(){
    if(arrived||sc.overlayTiming==='start')return; arrived=true;
    sceneBack.classList.add('show');
    if(key==='vision'){ visionOverlay.classList.add('show'); setTimeout(()=>flyAnswer.focus(),300); }
  }
  playScene(f, function(){
    showVid(sc.fwd);
    if(sc.overlayTiming==='start'){              // slide the panel in WHILE the character turns
      setTimeout(function(){ sceneBack.classList.add('show'); document.getElementById(sc.overlay).classList.add('show'); }, 250);
    }
  });
  f.onended=()=>{ try{f.pause();}catch(e){} revealArrival(); };
  // Safety net: if the video can't play to its end, still reveal so the user is never stuck.
  if(sc.overlayTiming!=='start') setTimeout(revealArrival, 3500);
}
function endScene(){
  if(!curScene)return;const sc=SCENES[curScene];
  if(curScene==='vision'){data.vision=flyAnswer.value;localStorage.setItem(STORE,JSON.stringify(data));refreshOrbState();}
  visionOverlay.classList.remove('show');skillOverlay.classList.remove('show');sceneBack.classList.remove('show');
  const r=document.getElementById(sc.rev);
  // Tear down the stage exactly once, even if the reverse video stalls or never loads.
  let exited=false;
  function finishExit(){
    if(exited)return; exited=true;
    sceneStage.classList.remove('show');document.body.classList.remove('flying');
    setTimeout(()=>{sceneActive=false;curScene=null;},220);
  }
  // keep the held forward frame visible; only swap to reverse once its first frame is decoded
  setTimeout(()=>{ playScene(r, function(){ showVid(sc.rev); }); }, curScene==='self'?320:160);
  r.onended=finishExit;
  setTimeout(finishExit, 4000); // safety net if the reverse video can't finish
}
sceneBack.addEventListener('click',endScene);
flyAnswer.addEventListener('input',()=>{clearTimeout(saveTimer);saveTimer=setTimeout(()=>{data.vision=flyAnswer.value;localStorage.setItem(STORE,JSON.stringify(data));refreshOrbState();},500);});
document.getElementById('flySave').addEventListener('click',()=>{data.vision=flyAnswer.value;localStorage.setItem(STORE,JSON.stringify(data));refreshOrbState();const m=document.getElementById('flySaved');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),1600);});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&sceneActive&&sceneBack.classList.contains('show'))endScene();});

/* ====== Interactive skill tree ====== */
const RANKS=3, START_POINTS=12, SKILL_STORE='skillTree.v1';
const ICONS={
  people:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><circle cx="17" cy="9" r="2.2"/><path d="M15 19a4.5 4.5 0 0 1 6.5-3.7"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="6"/><path d="M16 16l4 4"/></svg>',
  board:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M12 16v4M8 20h8M7 8h7M7 11h5"/></svg>',
  handshake:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M7 12l3-3 3 2 3-2 2 2"/><path d="M4 9l3-3 4 1M20 9l-3-3-2 .6"/><path d="M7 12l-2 2 3 3 2-1 3 2 3-3"/></svg>',
  trophy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M8 4h8v4a4 4 0 0 1-8 0V4z"/><path d="M8 5H5v1a3 3 0 0 0 3 3M16 5h3v1a3 3 0 0 1-3 3"/><path d="M12 12v4M9 20h6M10 20l.5-4M14 20l-.5-4"/></svg>',
  wave:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 12h2M8 8v8M12 5v14M16 8v8M20 12h0"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 6c-2-1.5-5-1.5-7 0v12c2-1.5 5-1.5 7 0 2-1.5 5-1.5 7 0V6c-2-1.5-5-1.5-7 0z"/><path d="M12 6v12"/></svg>',
  spotlight:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="7" r="2.4"/><path d="M9 21c0-3 1.5-5 3-5s3 2 3 5"/><path d="M12 2v2M5 5l1.5 1.5M19 5l-1.5 1.5"/></svg>',
  chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 5h13v9H9l-4 3v-3H4z"/><path d="M20 9v8l-3-2h-4"/></svg>',
  mic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="9" y="3" width="6" height="10" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4M9 21h6"/></svg>',
  compass:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8.5"/><path d="M15.5 8.5l-2 5-5 2 2-5z"/></svg>',
  team:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="7" r="2.3"/><circle cx="5.5" cy="10" r="2"/><circle cx="18.5" cy="10" r="2"/><path d="M8.5 19a3.5 3.5 0 0 1 7 0M2.5 18a3 3 0 0 1 4.5-2.6M21.5 18a3 3 0 0 0-4.5-2.6"/></svg>',
  eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2.5 12S6 6 12 6s9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6z"/><circle cx="12" cy="12" r="2.6"/></svg>',
  crown:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 18h16M4 18l-1.5-9 5 4 4.5-7 4.5 7 5-4L20 18"/></svg>'
};
const TRACKS=[
  {key:'sales',name:'Sales',nodes:[
    {nm:'Prospecting',ic:'people'},{nm:'Discovery',ic:'search'},{nm:'Pitching',ic:'board'},{nm:'Negotiation',ic:'handshake'},{nm:'Closing',ic:'trophy'}]},
  {key:'speaking',name:'Public Speaking',nodes:[
    {nm:'Voice',ic:'wave'},{nm:'Storytelling',ic:'book'},{nm:'Stage Presence',ic:'spotlight'},{nm:'Q & A',ic:'chat'},{nm:'Keynote',ic:'mic'}]},
  {key:'leadership',name:'Leadership',nodes:[
    {nm:'Self-Mastery',ic:'compass'},{nm:'Communication',ic:'chat'},{nm:'Team Building',ic:'team'},{nm:'Vision',ic:'eye'},{nm:'Legacy',ic:'crown'}]}
];
function loadSkill(){
  let d={};try{d=JSON.parse(localStorage.getItem(SKILL_STORE)||'{}');}catch(e){}
  if(typeof d.points!=='number')d.points=START_POINTS;
  TRACKS.forEach(t=>{ if(!Array.isArray(d[t.key])||d[t.key].length!==5)d[t.key]=[0,0,0,0,0]; });
  return d;
}
let skill=loadSkill();
function saveSkill(){localStorage.setItem(SKILL_STORE,JSON.stringify(skill));}
function frontier(track){const a=skill[track];for(let i=0;i<5;i++){if(a[i]<RANKS)return i;}return 5;}
function addPoint(track,idx){
  if(idx!==frontier(track))return; if(skill.points<=0)return;
  skill[track][idx]++; skill.points--; saveSkill(); renderSkill();
}
function removeLast(track){
  const a=skill[track];for(let i=4;i>=0;i--){if(a[i]>0){a[i]--;skill.points++;saveSkill();renderSkill();return;}}
}
function resetSkill(){TRACKS.forEach(t=>skill[t.key]=[0,0,0,0,0]);skill.points=START_POINTS;saveSkill();renderSkill();}
function renderSkill(){
  const p=document.getElementById('skillPanel');
  let cols='';
  TRACKS.forEach(t=>{
    const fr=frontier(t.key);
    let nodesHtml='';
    for(let i=4;i>=0;i--){
      const rank=skill[t.key][i];
      let cls='node';
      if(rank>=RANKS)cls+=' filled';
      else if(i===fr)cls+=(rank>0?' partial':' active');
      else if(i>fr)cls+=' locked';
      else cls+=' filled';
      const clickable=(i===fr);
      nodesHtml+=`<div class="${cls}" data-track="${t.key}" data-idx="${i}" ${clickable?'data-add="1"':''}>
        <div class="ring">${ICONS[t.nodes[i].ic]||''}</div>
        <div class="lvl">${rank}/${RANKS}</div>
        <div class="nm">${t.nodes[i].nm}</div></div>`;
      if(i>0){ const on=(skill[t.key][i-1]>=RANKS); nodesHtml+=`<div class="connector ${on?'on':''}"></div>`; }
    }
    cols+=`<div class="skill-col" data-col="${t.key}"><h4>${t.name}</h4>${nodesHtml}</div>`;
  });
  p.innerHTML=`<div class="skill-title">Skill Tree</div>
    <div class="skill-sub"><span class="dash"></span><span><b>${skill.points}</b> skill points available</span><span class="dash r"></span></div>
    <div class="skill-cols">${cols}</div>
    <div class="skill-foot"><button class="reset" id="skillReset">Reset</button><span class="skill-hint">Click a glowing skill to spend a point &middot; right-click a track to refund</span></div>`;
  p.querySelectorAll('[data-add]').forEach(n=>n.addEventListener('click',()=>addPoint(n.dataset.track,+n.dataset.idx)));
  p.querySelectorAll('.skill-col').forEach(c=>c.addEventListener('contextmenu',e=>{e.preventDefault();removeLast(c.dataset.col);}));
  document.getElementById('skillReset').addEventListener('click',resetSkill);
}


/* ---- Background music (loops, user-controlled, top-level) ---- */
var soundOn=false, fadeTimer;
function fadeTo(target, done){
  var bgm=document.getElementById('bgm'); if(!bgm)return;
  clearInterval(fadeTimer);
  fadeTimer=setInterval(function(){
    var d=target-bgm.volume;
    if(Math.abs(d)<0.04){ bgm.volume=target; clearInterval(fadeTimer); done&&done(); }
    else bgm.volume=Math.min(1,Math.max(0,bgm.volume+(d>0?0.04:-0.04)));
  },40);
}
function setSound(on){
  var bgm=document.getElementById('bgm'), sb=document.getElementById('soundBtn'); if(!bgm||!sb)return;
  soundOn=on;
  if(on){ bgm.volume=0; var pr=bgm.play(); if(pr&&pr.catch)pr.then(function(){fadeTo(0.55);}).catch(function(e){console.log('audio blocked',e);}); sb.classList.add('on'); sb.innerHTML='♪ Sound on'; }
  else { fadeTo(0,function(){bgm.pause();}); sb.classList.remove('on'); sb.innerHTML='♪ Sound'; }
}
(function(){var sb=document.getElementById('soundBtn'); if(sb) sb.addEventListener('click',function(){setSound(!soundOn);});})();
</script>
